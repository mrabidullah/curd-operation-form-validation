<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teachers Registration Form</title>
  <style>
    /* ===============================
       RESET + BASE
    ================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      animation: bgShift 20s infinite alternate;
    }
    @keyframes bgShift {
      0% { background: linear-gradient(135deg, #6a11cb, #2575fc); }
      50% { background: linear-gradient(135deg, #ff4e50, #f9d423); }
      100% { background: linear-gradient(135deg, #43cea2, #185a9d); }
    }

    /* ===============================
       FORM CONTAINER
    ================================ */
    .form-container {
      width: 420px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      padding: 40px;
      animation: float 6s ease-in-out infinite;
      position: relative;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .form-container::before {
      content: "";
      position: absolute;
      top: -20px;
      left: -20px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
      border-radius: 50%;
      animation: bubble 10s infinite alternate;
    }
    @keyframes bubble {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(30px,40px) scale(1.2); }
    }

    .form-container h2 {
      text-align: center;
      color: #fff;
      font-size: 28px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.5);
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 5px #fff, 0 0 10px #00f; }
      to { text-shadow: 0 0 20px #fff, 0 0 40px #0ff; }
    }

    /* ===============================
       INPUT FIELDS
    ================================ */
    .form-group {
      position: relative;
      margin-bottom: 25px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #f1f1f1;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 10px #00f, inset 0 4px 12px rgba(0,0,0,0.3);
      transform: scale(1.02);
    }
    .form-group textarea {
      resize: none;
      height: 100px;
    }

    /* ===============================
       BUTTON
    ================================ */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #43cea2, #185a9d);
      color: #fff;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all 0.4s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .btn-submit:hover {
      background: linear-gradient(45deg, #ff4e50, #f9d423);
      transform: scale(1.05) rotate(-1deg);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    .btn-submit:active {
      transform: scale(0.97);
    }

    /* ===============================
       EXTRA ANIMATION DECORATIONS
    ================================ */
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: move 20s infinite linear;
    }
    .circle:nth-child(1) {
      width: 100px; height: 100px;
      background: #ff4e50;
      top: 10%; left: 5%;
      animation-duration: 25s;
    }
    .circle:nth-child(2) {
      width: 150px; height: 150px;
      background: #2575fc;
      bottom: 15%; right: 10%;
      animation-duration: 30s;
    }
    .circle:nth-child(3) {
      width: 70px; height: 70px;
      background: #43cea2;
      top: 70%; left: 20%;
      animation-duration: 18s;
    }
    @keyframes move {
      0% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(30px, -40px) rotate(180deg); }
      100% { transform: translate(-20px,20px) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <form class="form-container" action="{% url 'U_form' i.id %}" method="POST">
            {% csrf_token %}
    <h2>Teachers Registration</h2>
    <div class="form-group">
      <label for="name">Teacher Name</label>
      <input type="text" id="name" name="name"value="{{i.name}}" placeholder="Enter teacher name" required>
    </div>
    <div class="form-group">
      <label for="f_name">Father Name</label>
      <input type="text" id="f_name" name="f_name"value="{{i.f_name}}" placeholder="Enter father's name" required>
    </div>
    <div class="form-group">
      <label for="P_number">Phone Number</label>
      <input type="tel" id="P_number" name="P_number"value="{{i.P_name}}" placeholder="+92XXXXXXXXXX" required>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email"value="{{i.email}}" placeholder="Enter email" required>
    </div>
    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" name="address"value="{{i.address}}" placeholder="Enter address" required>
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message"value="{{i.message}}" placeholder="Write message here"></textarea>
    </div>
    <button type="submit" class="btn-submit">Submit</button>
  </form>
</body>
</html>
