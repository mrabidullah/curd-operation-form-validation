{% extend 'dash.html'%}
{% block contact%} 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Pink Dashboard</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #ffe4f0;
      color: #333;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      background-color: #ff69b4;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      animation: fadeInDown 1s ease;
    }

    .navbar h1 {
      font-size: 1.8rem;
    }
    i span{
        color: #1E3A8A;
    }

    .navbar nav a {
      color: white;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .navbar nav a:hover {
      color: #ffd6e8;
    }

    /* Search bar */
    .search-bar {
      margin: 20px auto;
      width: 80%;
      display: flex;
      justify-content: center;
      animation: fadeIn 1.5s ease;
    }

    .search-bar input {
      padding: 10px;
      width: 60%;
      border: 2px solid #1E3A8A;
      border-radius: 5px 0 0 5px;
      outline: none;
    }

    .search-bar button {
      padding: 10px 20px;
      background:  #1E3A8A;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .search-bar button:hover {
      background: #e754a1;
    }

    /* Dashboard cards */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px 40px;
      animation: fadeInUp 1s ease;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #ff69b4;
    }

    .card-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .card-buttons button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-update {
      background: #ffb347;
    }

    .btn-update:hover {
      background: #e89b30;
    }

    .btn-delete {
      background: #ff4d4d;
    }

    .btn-delete:hover {
      background: #d93b3b;
    }

    .btn-entry {
      background: #87cefa;
    }

    .btn-entry:hover {
      background: #62b0e8;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      } to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      } to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      } to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .search-bar input {
        width: 100%;
      }

      .search-bar {
        flex-direction: column;
        gap: 10px;
      }

      .search-bar button {
        width: 100%;
        border-radius: 5px;
      }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h1><i><span>College</span> Management System</i></h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Entries</a>
      <a href="#">Settings</a>
    </nav>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="Search entries...">
    <button>Search</button>
  </div>

  <div class="dashboard">
    <!-- Example Card 1 -->
    <div class="card">
      <h3> <a href="{% url 'form' %}">Student Entry</a></h3>
      <p>this is only student entry </p>
      <div class="card-buttons">
      </div>
    </div>

    <!-- Example Card 2 -->
    <div class="card">
      <h3>Teacher Entry </h3>
      <p>only teacher </p>
      <div class="card-buttons">
      </div>
    </div>

    <!-- Entry Button -->
    <div class="card">
      <h3> New admin Entry</h3>
      <p> Nem admin entry</p>
      <div class="card-buttons">
      </div>
    </div>
  </div>

</body>
</html>
{% endblock contact%}
