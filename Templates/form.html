
  
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Apply Form</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap');

    /* Base Reset & Typography */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Rotating Neon Circle Background */
    .circle-background {
      position: absolute;
      width: 500px;
      height: 500px;
      background: conic-gradient(#0ef 0% 25%, transparent 70% 100%);
      border-radius: 50%;
      animation: spin 6s linear infinite;
      z-index: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Form Container */
    .form-container {
      position: relative;
      z-index: 1;
      background-color: #1e1e1e;
      width: 400px;
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 0 20px rgba(0, 238, 255, 0.2);
      text-align: center;
    }

    .form-container h1 {
      color: #0ef;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    /* Form Group Styles */
    .form-group {
      position: relative;
      margin-bottom: 25px;
      text-align: left;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: transparent;
      border: 2px solid #0ef;
      color: #fff;
      font-size: 14px;
      border-radius: 30px;
      outline: none;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }

    .form-group textarea {
      border-radius: 15px;
      resize: none;
    }

    .form-group label {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background-color: #1e1e1e;
      padding: 0 5px;
      color: #aaa;
      font-size: 14px;
      pointer-events: none;
      transition: 0.3s ease;
    }

    /* Floating Label Animation */
    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label,
    .form-group textarea:focus + label,
    .form-group textarea:not(:placeholder-shown) + label {
      top: -10px;
      font-size: 12px;
      color: #0ef;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #0ef;
      color: #000;
      font-weight: 600;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background-color: #00d5ff;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <!-- Glowing Circular Background -->
  <div class="circle-background"></div>

  <!-- Application Form -->
  <div class="form-container">
    <h1>Student Apply Form</h1>
    <form action="{% url 'form' %}" method="POST">
      {% csrf_token %}

      <div class="form-group">
        <input type="text" name="name" id="name" required placeholder=" " />
        <label for="name">Name</label>
      </div>

      <div class="form-group">
        <input type="text" name="F_name" id="F_name" required placeholder=" " />
        <label for="fatherName">Father's Name</label>
      </div>

      <div class="form-group">
        <input type="text" name="dep_name" id="dep_name" required placeholder=" " />
        <label for="department">Department</label>
      </div>

      <div class="form-group">
        <input type="number" name="Roll_number" id="Roll_number" required placeholder=" " />
        <label for="rollNumber">Roll Number</label>
      </div>

      <div class="form-group">
        <textarea name="address" id="address" rows="2" required placeholder=" "></textarea>
        <label for="address">Address</label>
      </div>

      <div class="form-group">
        <input type="email" name="email" id="email" required placeholder=" " />
        <label for="email">Email</label>
      </div>

      <div class="form-group">
        <input type="number" step="0.01" name="marks" id="marks" required placeholder=" " />
        <label for="marks">Marks</label>
      </div>

      <button type="submit" class="submit-btn">Submit Application</button>
    </form>
  </div>
</body>
    
</html>
