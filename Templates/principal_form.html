<form action="{% url 'principle' %}" method="post">
  {% csrf_token %}
  <div class="field">
    <label for="name">Your Name</label>
    <input id="name" name="name" class="input" placeholder="Enter your full name" required />
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" name="email" class="input" placeholder="you@example.com" required />
  </div>
  <div class="field">
    <label for="subject">Subject</label>
    <input id="subject" name="subject" class="input" placeholder="e.g., Appointment Request" />
  </div>
  <div class="field">
    <label for="messageBox">Message</label>
    <textarea id="Txt_msg" name="Txt_msg" class="textarea" placeholder="Write your message…" required></textarea>
  </div>
  <button class="btn btn-primary" type="submit">Send Message</button>
</form>

{% if messages %}
  {% for msg in messages %}
    <p style="color: green;">{{ msg }}</p>
  {% endfor %}
{% endif %}
