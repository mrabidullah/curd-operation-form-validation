<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Student Table</title>
<style>
    /* === Table Background === */
table {
    width: 100%;
    border-collapse: collapse;
    background: linear-gradient(180deg, #ffffff 0%, #f1f4f9 100%);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0px 6px 25px rgba(0, 0, 0, 0.1);
    animation: fadeIn 0.8s ease-out;
}

/* === Table Header === */
th {
    background: linear-gradient(135deg, #007BFF, #004a99);
    color: #fff;
    padding: 15px;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-right: 1px solid rgba(255, 255, 255, 0.2);
}
th:last-child {
    border-right: none;
}

/* === Column Styling === */
td {
    padding: 14px 15px;
    text-align: center;
    font-size: 0.95rem;
    border-right: 1px solid #ddd;
}
td:last-child {
    border-right: none;
}

/* === Row Styling === */
tbody tr:nth-child(odd) {
    background-color: rgba(0, 123, 255, 0.03); /* Light blue tint */
}
tbody tr:nth-child(even) {
    background-color: rgba(0, 0, 0, 0.02); /* Light gray tint */
}

/* === Row Hover Animation === */
tbody tr {
    transition: background 0.3s ease, transform 0.2s ease;
}
tbody tr:hover {
    background: rgba(0, 123, 255, 0.08);
    transform: scale(1.005);
}

/* === Active Row Click Effect === */
tbody tr:active {
    background: rgba(0, 255, 127, 0.15);
    box-shadow: inset 0 0 12px rgba(0, 255, 127, 0.3);
}

/* === Animation Keyframes === */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e9ecef, #f8f9fa);
        padding: 30px;
        margin: 0;
        color: #333;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
        font-weight: 700;
        color: #222;
        animation: fadeDown 0.8s ease-out;
    }

    /* Table Base */
    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.15);
        animation: fadeIn 1s ease-out;
    }

    /* Table Head */
    th {
        background: linear-gradient(135deg, #007BFF, #0056b3);
        color: white;
        padding: 15px;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
        cursor: pointer;
        position: relative;
        user-select: none;
    }

    th:hover {
        background: linear-gradient(135deg, #339CFF, #004a99);
    }

    /* Sort Arrow */
    th.sort-asc::after {
        content: " ▲";
        font-size: 0.8rem;
    }
    th.sort-desc::after {
        content: " ▼";
        font-size: 0.8rem;
    }

    /* Table Body */
    td {
        padding: 14px 15px;
        border-bottom: 1px solid #ddd;
        text-align: center;
        font-size: 0.95rem;
        transition: background 0.3s ease, transform 0.2s ease;
    }

    /* Row Hover */
    tbody tr:hover {
        background: rgba(0, 123, 255, 0.05);
        transform: scale(1.01);
    }

    /* Buttons */
    .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
    }

    .btn-update {
        background: linear-gradient(135deg, #28a745, #1e7e34);
        color: white;
    }
    .btn-update:hover {
        background: linear-gradient(135deg, #34d058, #22863a);
        transform: scale(1.05);
        box-shadow: 0px 4px 12px rgba(40, 167, 69, 0.4);
    }

    .btn-delete {
        background: linear-gradient(135deg, #dc3545, #a71d2a);
        color: white;
    }
    .btn-delete:hover {
        background: linear-gradient(135deg, #ff4757, #c82333);
        transform: scale(1.05);
        box-shadow: 0px 4px 12px rgba(220, 53, 69, 0.4);
    }

    /* Links in Buttons */
    .btn a {
        color: white;
        text-decoration: none;
    }

    /* Animations */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        table { font-size: 0.85rem; }
        th, td { padding: 10px; }
        .btn { padding: 6px 10px; font-size: 0.8rem; }
    }
</style>
</head>
<body>

<h2>Student List</h2>

<table id="studentTable">
    <thead>
        <tr>
            <th>Serial No</th>
            <th>Name</th>
            <th>Father's Name</th>
            <th>Department</th>
            <th>Roll Number</th>
            <th>Address</th>
            <th>Email</th>
            <th>Marks</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for i in rec1 %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ i.name }}</td>
            <td>{{ i.F_name }}</td>
            <td>{{ i.dep_name }}</td>
            <td>{{ i.Roll_number }}</td>
            <td>{{ i.address }}</td>
            <td>{{ i.email }}</td>
            <td>{{ i.marks }}</td>
            <td>
                <a href="{% url 'update' i.id %}" class="btn btn-update">Update</a>
                <a href="{% url 'delete' i.id %}" class="btn btn-delete">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
    // Sorting Functionality
    document.querySelectorAll("#studentTable th").forEach((header, index) => {
        header.addEventListener("click", () => {
            const table = header.closest("table");
            const tbody = table.querySelector("tbody");
            const rows = Array.from(tbody.querySelectorAll("tr"));
            const isAsc = header.classList.contains("sort-asc");
            
            // Remove sort classes
            table.querySelectorAll("th").forEach(th => th.classList.remove("sort-asc", "sort-desc"));
            header.classList.toggle("sort-asc", !isAsc);
            header.classList.toggle("sort-desc", isAsc);

            // Sort rows
            rows.sort((a, b) => {
                const aText = a.children[index].innerText.trim();
                const bText = b.children[index].innerText.trim();
                return isAsc 
                    ? aText.localeCompare(bText, undefined, {numeric: true}) 
                    : bText.localeCompare(aText, undefined, {numeric: true});
            });

            // Append sorted rows with animation
            rows.forEach((row, i) => {
                row.style.animation = `fadeIn 0.4s ease-out ${i * 0.05}s both`;
                tbody.appendChild(row);
            });
        });
    });
</script>

</body>
</html>
